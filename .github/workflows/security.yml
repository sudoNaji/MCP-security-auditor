name: Security

on:
  push:
    branches: ["main", "develop"]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    name: MCP Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install mcp-security-auditor
        run: pip install ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Scan source for vulnerabilities
        run: |
          mkdir -p reports
          mcp-audit scan-source examples/vulnerable_server.py \
            --format sarif --output reports/source-scan.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/source-scan.sarif
          category: mcp-audit

  audit-examples:
    name: Audit Example MCP Servers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mcp-security-auditor
        run: pip install .

      - name: Scan synthetic vulnerable server (JSON report)
        run: |
          mkdir -p reports
          mcp-audit scan-source examples/vulnerable_server.py \
            --format json --output reports/audit.json
        continue-on-error: true

      - name: Upload audit report artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-audit-reports
          path: reports/
