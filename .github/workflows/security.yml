name: Security

on:
  push:
    branches: ["main", "develop"]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    name: MCP Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install mcp-security-auditor
        run: pip install ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Scan source — SARIF report
        run: |
          mkdir -p reports
          mcp-audit scan-source examples/vulnerable_server.py \
            --format sarif --output reports/source-scan.sarif
        continue-on-error: true

      - name: Scan source — JSON report
        run: |
          mcp-audit scan-source examples/vulnerable_server.py \
            --format json --output reports/source-scan.json
        continue-on-error: true

      - name: Print audit summary
        run: |
          python3 - << 'PYEOF'
          import json, sys
          data = json.load(open("reports/source-scan.json"))
          s = data["summary"]
          print(f"\n{'='*50}")
          print(f"  MCP Audit — {s['total_findings']} finding(s) across {s['total_targets']} target(s)")
          for sev, count in s["severity_breakdown"].items():
              if count:
                  print(f"    {sev}: {count}")
          print(f"{'='*50}\n")
          PYEOF

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-audit-reports
          path: reports/
          retention-days: 30

      - name: Upload SARIF to Code Scanning
        # Requires GitHub Advanced Security (free for public repos,
        # paid for private). Skipped gracefully if not available.
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/source-scan.sarif
          category: mcp-audit

  audit-schema:
    name: Audit Tool Schemas
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mcp-security-auditor
        run: pip install .

      - name: Scan example tool schemas
        run: |
          mkdir -p reports
          # scan any .json files in examples/ if present
          find examples/ -name "*.json" -exec \
            mcp-audit scan-schema {} --format json \; \
            2>/dev/null || echo "No schema files found"
        continue-on-error: true

      - name: Upload schema reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-schema-reports
          path: reports/
          retention-days: 30
